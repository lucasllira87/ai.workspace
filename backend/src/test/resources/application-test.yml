spring:
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  mail:
    host: localhost
    port: 2525

# Disable AI providers in tests
ai:
  providers:
    openai:
      enabled: false
    anthropic:
      enabled: false
    google:
      enabled: false

# JWT config for tests — prefix matches @ConfigurationProperties(prefix = "jwt")
jwt:
  secret: test-secret-key-for-tests-only-must-be-256-bits-long-xxxxxxxxxx
  access-token-expiration: 900
  refresh-token-expiration: 604800
