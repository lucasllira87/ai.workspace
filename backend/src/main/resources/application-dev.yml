spring:
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.aiworkspace: DEBUG
    com.aiworkspace.aicore.application.pipeline: DEBUG
    com.aiworkspace.aicore.application.orchestrator: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

management:
  endpoint:
    health:
      show-details: always
