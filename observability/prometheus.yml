global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    cluster: local

scrape_configs:

  - job_name: ai-workspace-backend
    metrics_path: /actuator/prometheus
    scrape_interval: 10s
    static_configs:
      - targets:
          - backend:8080
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: backend

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
