server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Health probe used by Docker HEALTHCHECK and load balancers
    location /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Proxy API calls to backend; preserve original headers
    location /api/ {
        proxy_pass         http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Required for SSE streams: disable buffering so chunks flow through
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;

        add_header X-Frame-Options        "SAMEORIGIN"                        always;
        add_header X-Content-Type-Options "nosniff"                           always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin"   always;
    }

    # SPA fallback — all unknown paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;

        add_header X-Frame-Options        "SAMEORIGIN"                        always;
        add_header X-Content-Type-Options "nosniff"                           always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin"   always;
    }

    # Static asset caching — repeats security headers because nginx add_header
    # does NOT inherit from parent block when the location has its own add_header.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        access_log off;

        add_header Cache-Control          "public, immutable, max-age=31536000";
        add_header X-Frame-Options        "SAMEORIGIN"                        always;
        add_header X-Content-Type-Options "nosniff"                           always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin"   always;
    }
}
