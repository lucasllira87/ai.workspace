name: Release

on:
  push:
    branches: [main]

# Requires CI to pass first
concurrency:
  group: release-${{ github.sha }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND:  ghcr.io/${{ github.repository_owner }}/ai-workspace-backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/ai-workspace-frontend

jobs:

  ci:
    uses: ./.github/workflows/ci.yml

  build-and-push:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Backend image ────────────────────────────────────────────────────
      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file:    ./backend/Dockerfile
          push:    true
          tags: |
            ${{ env.IMAGE_BACKEND }}:${{ github.sha }}
            ${{ env.IMAGE_BACKEND }}:latest
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,mode=max,scope=backend

      # ── Frontend image ───────────────────────────────────────────────────
      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file:    ./frontend/Dockerfile
          push:    true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
            ${{ env.IMAGE_FRONTEND }}:latest
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,mode=max,scope=frontend

      # ── Summary ──────────────────────────────────────────────────────────
      - name: Write job summary
        run: |
          echo "## Images published" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| backend  | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| frontend | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
